# Sub-action: windows-exe — Unsigned Windows EXE → GitHub Release
# Part of openMF/mifos-x-actionhub-publish-desktop-kmp@v2.0.0
#
# 🆕 NEW. Was inline `script.sh` in kmp-project-template/deployment/desktop/windows-exe/.
# Runs on windows-latest. Builds via packageReleaseExe, uploads to GH Release,
# flips prerelease/latest flags per `stage` input (direct-distro promotion ladder).
name: 'KMP Publish Desktop — Windows EXE (unsigned)'
description: 'Build unsigned Windows EXE installer + upload to GitHub Release with stage flag flip (prerelease/beta/stable).'
author: 'Mifos Initiative'
branding: { icon: 'upload', color: 'blue' }

inputs:
  desktop_package_name: { required: true,  description: 'Desktop module name' }
  flavor:               { required: false, default: 'prod', description: 'Gradle flavor' }
  github_tag:           { required: true,  description: 'GH Release tag (must exist)' }
  stage:                { required: false, default: 'stable', description: 'GH Release stage: prerelease | beta | stable' }
  java-version:         { required: false, default: '17',   description: 'JDK version' }

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-java@v4
      with: { distribution: zulu, java-version: '${{ inputs.java-version }}' }

    - name: Build EXE installer
      shell: bash
      env: { FLAVOR: '${{ inputs.flavor }}', PKG: '${{ inputs.desktop_package_name }}' }
      run: ./gradlew ":$PKG:packageReleaseExe" "-PflavorDimension=$FLAVOR"

    - name: Locate + upload + apply stage flags
      shell: bash
      env:
        PKG:               ${{ inputs.desktop_package_name }}
        TAG:               ${{ inputs.github_tag }}
        STAGE:             ${{ inputs.stage }}
        GH_TOKEN:          ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail
        EXE=$(find "$PKG/build/compose/binaries/main-release/exe" -name '*.exe' -type f | head -1)
        [[ -f "$EXE" ]] || { echo "::error::EXE not found"; exit 1; }
        gh release upload "$TAG" "$EXE" --clobber
        bash "$GITHUB_ACTION_PATH/../_shared/scripts/common/gh-release-stage.sh" "$TAG" "$STAGE"
